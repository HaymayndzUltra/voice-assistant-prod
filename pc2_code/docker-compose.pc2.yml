version: '3.8'

networks:
  pc2_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
  external_network:
    driver: bridge

volumes:
  pc2_logs:
  pc2_data:
  pc2_models:
  pc2_cache:

services:
  # Phase 1 - Integration Layer Agents

  memory-orchestrator-service:
    build:
      context: ../..
      dockerfile: pc2_code/docker/Dockerfile.pc2-base
    image: pc2-base:latest
    container_name: pc2-memory-orchestrator-service
    command: ["python", "-m", "pc2_code.agents.memory_orchestrator_service"]
    networks:
      - pc2_network
      - external_network
    ports:
      - "7140:7140"
      - "8140:8140"
    volumes:
      - pc2_logs:/app/logs
      - pc2_data:/app/data
      - pc2_models:/app/models
      - pc2_cache:/app/cache
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=INFO
      - DEBUG_MODE=false
      - BIND_ADDRESS=0.0.0.0
      - AGENT_NAME=MemoryOrchestratorService
      - AGENT_PORT=7140
      - HEALTH_CHECK_PORT=8140
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8140/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s
    restart: unless-stopped

  tiered-responder:
    build:
      context: ../..
      dockerfile: pc2_code/docker/Dockerfile.pc2-base
    image: pc2-base:latest
    container_name: pc2-tiered-responder
    command: ["python", "-m", "pc2_code.agents.tiered_responder"]
    depends_on:
      - resource-manager
    networks:
      - pc2_network
      - external_network
    ports:
      - "7100:7100"
      - "8100:8100"
    volumes:
      - pc2_logs:/app/logs
      - pc2_data:/app/data
      - pc2_models:/app/models
      - pc2_cache:/app/cache
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=INFO
      - DEBUG_MODE=false
      - BIND_ADDRESS=0.0.0.0
      - AGENT_NAME=TieredResponder
      - AGENT_PORT=7100
      - HEALTH_CHECK_PORT=8100
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 3G
        reservations:
          cpus: '0.3'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
